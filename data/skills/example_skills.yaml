# 示例技能数据
# 用于演示和测试

- id: "qiime2"
  type: "tool"
  data:
    name: "QIIME2"
    version: "2024.2"
    description: "强大的、可扩展的微生物组分析平台，支持从原始测序数据到统计分析和可视化的完整流程"
    category: "analysis"
    url: "https://qiime2.org/"
    repo_url: "https://github.com/biocore/qiime2"
    paper_url: "https://www.nature.com/articles/nbt.4260"
    installation: |
      # 使用 conda 安装
      conda install -c qiime2 -c conda-forge qiime2

      # 或使用 Docker
      docker pull qiime2/core:2024.2
    usage_example: |
      # 导入数据
      qiime tools import \
        --type 'SampleData[SequencesWithQuality]' \
        --input-path demux \
        --output-path demux.qza
      
      # 质量过滤和去噪
      qiime dada2 denoise-paired \
        --i-demultiplexed-seqs demux.qza \
        --o-table table.qza \
        --o-representative-sequences rep-seqs.qza
    tags: ["16S", "metagenomics", "python", "denoising", "visualization"]
    skill_level: "intermediate"

- id: "dada2"
  type: "tool"
  data:
    name: "DADA2"
    version: "1.30"
    description: "高分辨率的样本推断算法，可从扩增子测序数据中精确识别序列变异"
    category: "denoising"
    url: "https://benjjneb.github.io/dada2/"
    repo_url: "https://github.com/benjjneb/dada2"
    paper_url: "https://www.nature.com/articles/nmeth.3869"
    installation: |
      # 在 R 中安装
      if (!require("BiocManager", quietly = TRUE))
          install.packages("BiocManager")
      BiocManager::install("dada2")
    usage_example: |
      # R 代码示例
      library(dada2)
      
      # 过滤和截断
      filtFs <- filterAndTrim(fnFs, filtFs, truncLen=c(240,0))
      
      # 学习错误率
      errF <- learnErrors(filtFs)
      
      # 去噪
      dadaFs <- dada(filtFs, err=errF)
    tags: ["16S", "denoising", "R", "ASV", "amplicon"]
    skill_level: "intermediate"

- id: "metaphlan"
  type: "tool"
  data:
    name: "MetaPhlAn"
    version: "4.0"
    description: "用于从宏基因组测序数据中快速准确地进行微生物组谱分析的超快工具"
    category: "profiling"
    url: "https://huttenhower.sph.harvard.edu/metaphlan/"
    repo_url: "https://github.com/biobakery/metaphlan"
    paper_url: "https://www.nature.com/articles/nmeth.3317"
    installation: |
      # 使用 pip 安装
      pip install metaphlan
      
      # 下载数据库
      metaphlan --install
    usage_example: |
      # 运行 MetaPhlAn
      metaphlan metagenome.fastq \
        --input_type fastq \
        --output_file profile.txt \
        --nproc 8
    tags: ["metagenomics", "profiling", "taxonomic", "python"]
    skill_level: "beginner"

- id: "16s-rrna-concept"
  type: "concept"
  data:
    name: "16S rRNA 基因"
    definition: "16S rRNA 基因是原核生物核糖体小亚基的组成部分，长度约 1500bp，包含保守区和可变区，广泛用于微生物分类和系统发育分析"
    explanation: |
      16S rRNA 基因测序是微生物组研究中最常用的方法之一。其原理是：
      
      1. **保守区**: 用于设计通用引物
      2. **可变区**: V1-V9 九个高变区，包含物种特异性序列
      3. **系统发育**: 通过序列比对构建进化树
      
      常用的可变区包括 V3-V4 和 V4 区。
    related_concepts: ["扩增子测序", "OTU", "ASV", "系统发育树"]
    examples:
      - "V4 区扩增引物：515F (5'-GTGCCAGCMGCCGCGGTAA-3')"
      - "V3-V4 区扩增引物：341F-805R"
    tags: ["16S", "sequencing", "taxonomy", "basics"]
    skill_level: "beginner"

- id: "assembly-workflow"
  type: "workflow"
  data:
    name: "宏基因组组装工作流"
    description: "从原始宏基因组测序数据到完整基因组的完整分析流程"
    steps:
      - "1. 质量控制：使用 FastQC 和 MultiQC 评估数据质量"
      - "2. 预处理：使用 Trimmomatic 或 fastp 去除低质量 reads 和 adapter"
      - "3. 组装：使用 MEGAHIT 或 metaSPAdes 进行 de novo 组装"
      - "4. 基因预测：使用 Prodigal 预测开放阅读框"
      - "5. 分箱：使用 MetaBAT2 或 MaxBin2 进行基因组分箱"
      - "6. 质量评估：使用 CheckM 评估 MAG 质量"
      - "7. 注释：使用 eggNOG-mapper 或 DRAM 进行功能注释"
    tools_used: ["FastQC", "Trimmomatic", "MEGAHIT", "Prodigal", "MetaBAT2", "CheckM"]
    input_format: "Illumina paired-end FASTQ"
    output_format: "MAGs (Metagenome-Assembled Genomes) in FASTA format"
    tags: ["metagenomics", "assembly", "binning", "MAG"]
    skill_level: "advanced"

- id: "alpha-diversity"
  type: "concept"
  data:
    name: "Alpha 多样性"
    definition: "衡量单个样本内微生物群落多样性的指标，包括丰富度（物种数量）和均匀度（物种分布的均匀程度）"
    explanation: |
      常用的 Alpha 多样性指数：
      
      - **Observed OTUs/ASVs**: 观测到的物种数量
      - **Shannon 指数**: 同时考虑丰富度和均匀度
      - **Simpson 指数**: 衡量优势物种的集中程度
      - **Pielou 均匀度**: 物种分布的均匀程度
      - **Faith's PD**: 考虑系统发育关系的多样性
    related_concepts: ["Beta 多样性", "Gamma 多样性", "物种丰富度"]
    examples:
      - "Shannon 指数计算：H' = -Σ(pi × ln(pi))"
      - "QIIME2 命令：qiime diversity alpha"
    tags: ["diversity", "statistics", "ecology"]
    skill_level: "intermediate"
