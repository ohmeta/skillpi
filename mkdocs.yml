# MkDocs 配置
site_name: SkillPI
site_description: Skill Catalogue for Microbiome Informatics Study
site_author: OHMeta Team
site_url: https://ohmeta.github.io/skillpi

# 仓库配置
repo_name: skillpi
repo_url: https://github.com/ohmeta/skillpi
edit_uri: edit/main/docs/

# 主题
theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: 切换到浅色模式

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到自动模式
  font:
    text: Roboto
    code: Roboto Mono

# 导航
nav:
  - 首页: index.md
  - 技能:
    - 工具: skills/tools.md
    - 工作流: skills/workflows.md
    - 概念: skills/concepts.md
  - 关于: about.md

# 插件
plugins:
  - search:
      lang:
        - zh
        - en

# Markdown 扩展
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: ohmeta
      repo: skillpi
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 额外 CSS
extra_css:
  - stylesheets/extra.css

# 自定义页面
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ohmeta/skillpi
  generator: false

# 版权
copyright: Copyright &copy; 2024 OHMeta Team
